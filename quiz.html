<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRE QUIZ - Exam</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f7f9; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; background: #6a11cb; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .quiz-container { width: 90%; max-width: 500px; background: white; margin-top: 20px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .timer-circle { width: 60px; height: 60px; border-radius: 50%; border: 4px solid #6a11cb; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-weight: bold; color: #6a11cb; font-size: 1.2rem; }
        .question { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: #333; }
        .option { width: 100%; padding: 15px; margin: 8px 0; border: 2px solid #eee; border-radius: 12px; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.3s; background: none; }
        .option:hover { border-color: #6a11cb; background: #f0edff; }
        #result-area { display: none; text-align: center; }
        .cert-btn { background: #28a745; color: white; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
<div class="header">വിദ്യാർത്ഥി: <span id="display-name">...</span></div>
<div class="quiz-container" id="quiz-box">
    <div class="timer-circle" id="timer">59</div>
    <div id="q-number" style="font-size: 0.8rem; color: #777;">Question 1/10</div>
    <div class="question" id="q-text">ലോഡ് ചെയ്യുന്നു...</div>
    <div id="options-container"></div>
</div>
<div class="quiz-container" id="result-area">
    <h2>പരീക്ഷ പൂർത്തിയായി!</h2>
    <p>നിങ്ങളുടെ സ്കോർ: <span id="score">0</span>/10</p>
    <div id="certificate-link"></div>
    <button class="cert-btn" onclick="window.location.href='index.html'">Back to Home</button>
</div>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDlfQj9aXExdD9on2Fl9yyq789HF0p3_dU",
        authDomain: "crequizapp.firebaseapp.com",
        projectId: "crequizapp",
        storageBucket: "crequizapp.firebasestorage.app",
        messagingSenderId: "273500358959",
        appId: "1:273500358959:web:eb59a5b743c92d16d8b9da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentQ = 0, score = 0, timeLeft = 59, timerInterval, questions = [];
    const studentName = localStorage.getItem("studentName") || "Guest";
    document.getElementById('display-name').innerText = studentName;

    db.collection("quiz_questions").limit(10).get().then((snap) => {
        snap.forEach((doc) => questions.push({ id: doc.id, ...doc.data() }));
        if(questions.length > 0) { showQuestion(); startTimer(); }
        else document.getElementById('q-text').innerText = "ചോദ്യങ്ങൾ ലഭ്യമല്ല.";
    });

    function showQuestion() {
        if (currentQ >= 10 || currentQ >= questions.length) { finishQuiz(); return; }
        timeLeft = 59;
        document.getElementById('q-number').innerText = `Question ${currentQ + 1}/10`;
        document.getElementById('q-text').innerText = questions[currentQ].question;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        questions[currentQ].options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option'; btn.innerText = opt;
            btn.onclick = () => { if(idx === questions[currentQ].correctIndex) score++; nextQuestion(); };
            container.appendChild(btn);
        });
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--; document.getElementById('timer').innerText = timeLeft;
            if (timeLeft <= 0) nextQuestion();
        }, 1000);
    }

    function nextQuestion() { currentQ++; showQuestion(); }

    function finishQuiz() {
        clearInterval(timerInterval);
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('score').innerText = score;
        db.collection("students").doc(studentName).update({
            hasAttended: true, score: score, submittedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        const certUrl = score >= 8 ? "https://i.postimg.cc/65DDZDWq/20260514-232020.jpg" : "https://i.postimg.cc/1t5TPSBQ/20260513-112519.png";
        document.getElementById('certificate-link').innerHTML = `<p>അഭിനന്ദനങ്ങൾ!</p><a href="${certUrl}" target="_blank"><button class="cert-btn" style="background:#007bff;">Download Certificate</button></a>`;
    }
</script>
</body>
</html>
