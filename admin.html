<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRE QUIZ - ADMIN PANEL</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --primary-color: #419f8a;     /* Dark Teal */
            --secondary-color: #5cbda3;   /* Teal */
            --accent-color: #c6eec9;      /* Light Green */
            --bg-color: #f1f8f6;          /* Clean soft background */
            --text-color: #2c3e50;
            --danger-color: #e53e3e;
            --danger-hover: #c53030;
            --warning-color: #dd6b20;
            --warning-hover: #c05621;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: var(--bg-color); 
            padding: 20px; 
            color: var(--text-color); 
            margin: 0;
        }

        .container { 
            max-width: 800px; 
            margin: 30px auto; 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.08); 
            text-align: center; 
            border-top: 6px solid var(--primary-color);
        }

        .logo-img {
            max-width: 120px;
            height: auto;
            margin-bottom: 10px;
        }

        h2 { 
            color: var(--primary-color); 
            margin-top: 5px;
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        h3 {
            color: var(--primary-color);
            font-size: 20px;
            margin-bottom: 15px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 8px;
            text-align: left;
        }

        .form-section {
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 30px;
        }

        .form-group { margin-bottom: 15px; text-align: left; }
        
        label { 
            font-weight: bold; 
            display: block; 
            margin-bottom: 6px; 
            color: var(--primary-color);
        }

        input[type="text"], select { 
            width: 100%; 
            padding: 11px; 
            border: 2px solid #e2e8f0; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 5px rgba(65, 159, 138, 0.2);
        }

        button { 
            background-color: var(--primary-color); 
            color: white; 
            padding: 12px 20px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            width: 100%; 
            box-shadow: 0 4px 6px rgba(65, 159, 138, 0.2);
            transition: all 0.3s ease;
        }

        button:hover { 
            background-color: var(--secondary-color); 
        }

        .btn-delete { 
            background-color: var(--danger-color); 
            padding: 6px 12px; 
            width: auto; 
            font-size: 14px; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
        }
        
        .btn-delete:hover { 
            background-color: var(--danger-hover); 
        }

        .clear-all { 
            background-color: var(--warning-color); 
            margin-bottom: 15px; 
            color: white; 
            width: auto;
            float: right;
        }
        
        .clear-all:hover { 
            background-color: var(--warning-hover); 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
            background: white; 
            text-align: left; 
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
        }

        th, td { padding: 14px; border-bottom: 1px solid #edf2f7; }
        
        th { 
            background-color: var(--primary-color); 
            color: white; 
            font-weight: bold;
        }

        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) { background-color: #fbfdfc; }
        
        .list-section { 
            margin-top: 40px; 
            padding-top: 10px; 
            clear: both;
        }

        .table-wrapper {
            overflow-x: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.postimg.cc/fbbMBjfX/20260513-082839-removebg-preview.png" alt="Logo" class="logo-img">
    
    <h2>CRE QUIZ - അഡ്മിൻ പാനൽ</h2>

    <div class="form-section">
        <h3>പുതിയ ചോദ്യം ചേർക്കുക</h3>
        <div class="form-group">
            <label>ചോദ്യം:</label>
            <input type="text" id="questionText" placeholder="ചോദ്യം ഇവിടെ ടൈപ്പ് ചെയ്യുക">
        </div>
        <div class="form-group"><label>ഓപ്ഷൻ 1:</label><input type="text" id="opt0"></div>
        <div class="form-group"><label>ഓപ്ഷൻ 2:</label><input type="text" id="opt1"></div>
        <div class="form-group"><label>ഓപ്शन 3:</label><input type="text" id="opt2"></div>
        <div class="form-group"><label>ഓപ്ഷൻ 4:</label><input type="text" id="opt3"></div>
        <div class="form-group">
            <label>ശരിയായ ഉത്തരം ഏത് ഓപ്ഷൻ ആണ്?</label>
            <select id="correctIndex">
                <option value="0">ഓപ്ഷൻ 1</option>
                <option value="1">ഓപ്ഷൻ 2</option>
                <option value="2">ഓപ്ഷൻ 3</option>
                <option value="3">ഓപ്ഷൻ 4</option>
            </select>
        </div>
        <button onclick="addQuestion()">ചോദ്യം സേവ് ചെയ്യുക</button>
    </div>

    <div class="list-section">
        <h3>നിലവിലുള്ള ചോദ്യങ്ങൾ</h3>
        <div class="table-wrapper">
            <table id="questionsTable">
                <thead>
                    <tr>
                        <th>ചോദ്യം</th>
                        <th style="width: 15%;">നടപടി</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div class="list-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="border: none; margin: 0; padding: 0;">വിദ്യാർത്ഥികളുടെ മാർക്ക് ലിസ്റ്റ് (Toppers List)</h3>
            <button class="clear-all" onclick="clearAllStudents()">മുഴുവൻ ലിസ്റ്റും ഡിലീറ്റ് ചെയ്യുക</button>
        </div>
        <div class="table-wrapper">
            <table id="studentsTable">
                <thead>
                    <tr>
                        <th>പേര്</th>
                        <th style="width: 20%;">മാർക്ക്</th>
                        <th style="width: 15%;">നടപടി</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDlTqjj9eXFxdO9on2Ff19yyq7",
        authDomain: "crequizapp.firebaseapp.com",
        projectId: "crequizapp",
        storageBucket: "crequizapp.appspot.com",
        messagingSenderId: "273500358959",
        appId: "1:273500358959:web:eb59a5b743c92c16d8b9cb"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    window.onload = function() {
        loadQuestions();
        loadStudents();
    };

    function addQuestion() {
        const qText = document.getElementById('questionText').value;
        const o0 = document.getElementById('opt0').value;
        const o1 = document.getElementById('opt1').value;
        const o2 = document.getElementById('opt2').value;
        const o3 = document.getElementById('opt3').value;
        const cIndex = parseInt(document.getElementById('correctIndex').value);

        if(!qText || !o0 || !o1 || !o2 || !o3) {
            alert("എല്ലാ കോളങ്ങളും പൂരിപ്പിക്കുക!");
            return;
        }

        db.collection("quiz_questions").add({
            question: qText,
            options: [o0, o1, o2, o3],
            correctIndex: cIndex
        }).then(() => {
            alert("ചോദ്യം വിജയകരമായി ചേർത്തു!");
            location.reload();
        });
    }

    function loadQuestions() {
        const tbody = document.querySelector("#questionsTable tbody");
        tbody.innerHTML = "<tr><td colspan='2' style='text-align:center;'>ലോഡ് ചെയ്യുന്നു...</td></tr>";
        
        db.collection("quiz_questions").get().then((querySnapshot) => {
            tbody.innerHTML = "";
            if(querySnapshot.empty) {
                tbody.innerHTML = "<tr><td colspan='2' style='text-align:center; color:#718096;'>ചോദ്യങ്ങൾ ഒന്നും തന്നെ ലഭ്യമല്ല.</td></tr>";
                return;
            }
            querySnapshot.forEach((doc) => {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${doc.data().question}</td><td><button class="btn-delete" onclick="deleteQuestion('${doc.id}')">Delete</button></td>`;
                tbody.appendChild(tr);
            });
        });
    }

    function deleteQuestion(id) {
        if(confirm("ഈ ചോദ്യം ഡാറ്റാബേസിൽ നിന്നും ഒഴിവാക്കണോ?")) {
            db.collection("quiz_questions").doc(id).delete().then(() => {
                alert("ചോദ്യം ഒഴിവാക്കി!");
                loadQuestions();
            });
        }
    }

    function loadStudents() {
        const tbody = document.querySelector("#studentsTable tbody");
        tbody.innerHTML = "<tr><td colspan='3' style='text-align:center;'>ലോഡ് ചെയ്യുന്നു...</td></tr>";
        
        db.collection("students").get().then((querySnapshot) => {
            tbody.innerHTML = "";
            if(querySnapshot.empty) {
                tbody.innerHTML = "<tr><td colspan='3' style='text-align:center; color:#718096;'>പരീക്ഷ എഴുതിയവരുടെ വിവരങ്ങൾ നിലവിലില്ല.</td></tr>";
                return;
            }
            
            let studentsList = [];
            querySnapshot.forEach((doc) => {
                studentsList.push({ id: doc.id, ...doc.data() });
            });
            studentsList.sort((a, b) => b.score - a.score);

            studentsList.forEach((data) => {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td><b>${data.name}</b></td><td>${data.score}</td><td><button class="btn-delete" onclick="deleteStudent('${data.id}')">Remove</button></td>`;
                tbody.appendChild(tr);
            });
        });
    }

    function deleteStudent(id) {
        if(confirm("ഈ വിദ്യാർത്ഥിയെ മാർക്ക് ലിസ്റ്റിൽ നിന്ന് ഒഴിവാക്കണോ?")) {
            db.collection("students").doc(id).delete().then(() => {
                alert("വിദ്യാർത്ഥിയെ ഒഴിവാക്കി!");
                loadStudents();
            }).catch((err) => { alert("Error: " + err); });
        }
    }

    function clearAllStudents() {
        if(confirm("മാർക്ക് ലിസ്റ്റ് പൂർണ്ണമായി ഡിലീറ്റ് ചെയ്യണോ? പഴയ മാർക്കുകൾ എല്ലാം നഷ്ടപ്പെടും.")) {
            db.collection("students").get().then((querySnapshot) => {
                let batch = db.batch();
                querySnapshot.forEach((doc) => { batch.delete(doc.ref); });
                batch.commit().then(() => {
                    alert("മാർക്ക് ലിസ്റ്റ് പൂർണ്ണമായി ക്ലീയർ ചെയ്തു!");
                    loadStudents();
                });
            });
        }
    }
</script>
</body>
</html>
