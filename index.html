<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>CRE QUIZ - പരീക്ഷയിൽ പങ്കെടുക്കുക</title>
    <meta property="og:title" content="CRE QUIZ">
    <meta property="og:description" content="നിങ്ങളുടെ പേരും പാസ്‌വേഡും നൽകി പരീക്ഷയിൽ പങ്കെടുക്കുക.">
    <meta property="og:image" content="https://i.postimg.cc/fbbMBjfX/20260513-082839-removebg-preview.png">
    <meta property="og:url" content="https://cre-quiz.vercel.app"> 
    <meta property="og:type" content="website">

    <style>
        body { font-family: sans-serif; background: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .logo { width: 130px; margin-bottom: 15px; }
        h2 { color: #1c3d8e; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-start { width: 100%; padding: 12px; background: #1c3d8e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://i.postimg.cc/fbbMBjfX/20260513-082839-removebg-preview.png" alt="Logo" class="logo">
    <h2>CRE QUIZ</h2>
    <input type="text" id="nameInput" placeholder="നിങ്ങളുടെ പേര്">
    <input type="password" id="passInput" placeholder="നിങ്ങളുടെ പാസ്‌വേഡ്">
    <button class="btn-start" onclick="startExam()">START EXAM</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDlfQj9aXExdD9on2Fl9yyq789HF0p3_dU",
        authDomain: "crequizapp.firebaseapp.com",
        projectId: "crequizapp",
        storageBucket: "crequizapp.firebasestorage.app",
        messagingSenderId: "273500358959",
        appId: "1:273500358959:web:eb59a5b743c92d16d8b9da"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function startExam() {
        const name = document.getElementById('nameInput').value.trim();
        const pass = document.getElementById('passInput').value.trim();
        
        if(!name || !pass) { alert("പേരും പാസ്‌വേഡും നൽകുക!"); return; }

        const studentRef = db.collection("students").doc(name);
        const doc = await studentRef.get();

        if(doc.exists) {
            const data = doc.data();
            if(data.password === pass) {
                if(data.hasAttended) {
                    alert("നിങ്ങൾ ഈ പരീക്ഷ എഴുതിക്കഴിഞ്ഞു!");
                } else {
                    localStorage.setItem("studentName", name);
                    window.location.href = "quiz.html";
                }
            } else {
                alert("ഈ പേരിൽ മറ്റൊരു പാസ്‌വേഡ് നിലവിലുണ്ട്. നിങ്ങളുടെ ശരിയായ പാസ്‌വേഡ് നൽകുക.");
            }
        } else {
            await studentRef.set({
                name: name,
                password: pass,
                hasAttended: false,
                score: 0
            });
            localStorage.setItem("studentName", name);
            window.location.href = "quiz.html";
        }
    }
</script>
</body>
</html>
